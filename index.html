<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot Premium</title>
    <style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: #e5e7eb;
    }

    .chat-container {
        width: 450px;
        height: 600px;
        margin: 40px auto;
        background: #111827;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .chat-header {
        background: #1e293b;
        padding: 15px;
        font-size: 18px;
        font-weight: bold;
        border-bottom: 1px solid #374151;
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .user, .bot {
        padding: 12px 15px;
        border-radius: 12px;
        max-width: 75%;
        line-height: 1.4;
        font-size: 14px;
    }

    .user {
        background: #2563eb;
        align-self: flex-end;
        color: white;
        border-bottom-right-radius: 4px;
    }

    .bot {
        background: #374151;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }

    .chat-input {
        display: flex;
        align-items: center;
        padding: 10px;
        background: #020617;
        border-top: 1px solid #374151;
    }

    input[type="text"] {
        flex: 1;
        padding: 12px;
        border-radius: 20px;
        border: none;
        outline: none;
        background: #1f2937;
        color: white;
        font-size: 14px;
    }

    button {
        margin-left: 8px;
        padding: 10px 14px;
        border-radius: 50%;
        border: none;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }

    button:hover {
        background: #1d4ed8;
    }

    #typing {
        font-size: 12px;
        color: #9ca3af;
        padding-left: 15px;
        padding-bottom: 5px;
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🤖 AI Chatbot
        <button onclick="toggleDarkMode()">🌓</button>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div id="typing"></div>

    <div class="chat-input">
        <input type="text" id="msg" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoice()">🎤</button>
        <input type="file" id="file" onchange="uploadFile()">
    </div>
</div>

<script>
let dark = false;

function toggleDarkMode() {
    dark = !dark;
    document.body.classList.toggle("dark-mode", dark);
}

function addMessage(message, sender) {
    let chatBox = document.getElementById("chat-box");
    let msgDiv = document.createElement("div");

    msgDiv.classList.add(sender);
    msgDiv.innerText = message;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping(status) {
    document.getElementById("typing").innerText = status ? "Bot is typing..." : "";
}

function sendMessage() {
    let msg = document.getElementById("msg").value;
    if(msg === "") return;

    addMessage(msg, "user");
    document.getElementById("msg").value = "";
    showTyping(true);

    fetch("/get", {
        method: "POST",
        body: new URLSearchParams({msg: msg}),
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        }
    })
    .then(res => res.json())
    .then(data => {
        showTyping(false);
        addMessage(data.response, "bot");
    });
}

// Voice Input
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.start();

    recognition.onresult = function(event) {
        let voiceMsg = event.results[0][0].transcript;
        document.getElementById("msg").value = voiceMsg;
        sendMessage();
    };
}

// File Upload
function uploadFile() {
    let fileInput = document.getElementById("file");
    let file = fileInput.files[0];
    if(file) {
        addMessage("File uploaded: " + file.name, "user");
    }
}

</script>

</body>
</html>
