<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot Premium</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            transition: background 0.3s;
        }

        .dark-mode {
            background: #1e1e1e;
            color: white;
        }

        .chat-container {
            width: 450px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: background 0.3s;
        }

        .dark-mode .chat-container {
            background: #2c2c2c;
        }

        .chat-header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .user, .bot {
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user {
            background: #DCF8C6;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #eee;
        }

        .dark-mode .bot {
            background: #444;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
            padding: 5px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-left: 5px;
            border-radius: 5px;
        }

        button:hover {
            background: #45a049;
        }

        #typing {
            font-style: italic;
            color: #999;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🤖 AI Chatbot
        <button onclick="toggleDarkMode()">🌓</button>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div id="typing"></div>

    <div class="chat-input">
        <input type="text" id="msg" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoice()">🎤</button>
        <input type="file" id="file" onchange="uploadFile()">
    </div>
</div>

<script>
let dark = false;

function toggleDarkMode() {
    dark = !dark;
    document.body.classList.toggle("dark-mode", dark);
}

function addMessage(message, sender) {
    let chatBox = document.getElementById("chat-box");
    let msgDiv = document.createElement("div");

    msgDiv.classList.add(sender);
    msgDiv.innerText = message;

    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping(status) {
    document.getElementById("typing").innerText = status ? "Bot is typing..." : "";
}

function sendMessage() {
    let msg = document.getElementById("msg").value;
    if(msg === "") return;

    addMessage(msg, "user");
    document.getElementById("msg").value = "";
    showTyping(true);

    fetch("/get", {
        method: "POST",
        body: new URLSearchParams({msg: msg}),
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        }
    })
    .then(res => res.json())
    .then(data => {
        showTyping(false);
        addMessage(data.response, "bot");
    });
}

// Voice Input
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.start();

    recognition.onresult = function(event) {
        let voiceMsg = event.results[0][0].transcript;
        document.getElementById("msg").value = voiceMsg;
        sendMessage();
    };
}

// File Upload
function uploadFile() {
    let fileInput = document.getElementById("file");
    let file = fileInput.files[0];
    if(file) {
        addMessage("File uploaded: " + file.name, "user");
        // Optional: Send file to backend for processing
    }
}
</script>

</body>
</html>
